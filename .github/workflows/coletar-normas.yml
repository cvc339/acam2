name: Coletar normas (DOU + MG)

# Coleta diaria de normas dos Diarios Oficiais (Uniao + Minas Gerais).
# Cada fonte tem uma unica publicacao diaria, entao uma execucao por dia basta.
#
# Pre-requisitos:
#   - Secret CRON_SECRET configurado em "Settings > Secrets and variables > Actions"
#   - Mesma string como variavel de ambiente CRON_SECRET no Railway (acam.com.br)

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT — DOU + MG
    - cron: '0 11 * * *'   # 08:00 BRT — DOU apenas (retry caso INLABS tenha caido as 07h)
    - cron: '0 12 * * *'   # 09:00 BRT — DOU apenas (segundo retry)
  workflow_dispatch:        # permite disparo manual pela UI do GitHub

concurrency:
  group: coletar-normas
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Coletar DOU
        # Tolera falhas transient do INLABS (governo). Se cair hoje, amanha roda de novo.
        continue-on-error: true
        run: |
          curl --fail-with-body --silent --show-error \
            --max-time 300 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://acam.com.br/api/admin/newsletter/coletar-dou

      - name: Coletar MG
        # So roda no primeiro horario do dia (07h BRT) ou em disparo manual.
        # MG raramente falha e e caro (puppeteer) — nao precisa de retries no mesmo dia.
        if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          curl --fail-with-body --silent --show-error \
            --max-time 420 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://acam.com.br/api/admin/newsletter/coletar-mg
